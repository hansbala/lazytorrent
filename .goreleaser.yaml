version: 2

project_name: lazytorrent

before:
  hooks:
    - go mod tidy

builds:
  - id: lazytorrent
    main: ./
    binary: lazytorrent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Tag }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

release:
  draft: false
  prerelease: auto

brews:
  - name: lazytorrent
    repository:
      owner: hansbala
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hansbala/lazytorrent"
    description: "A lazygit-style terminal UI for torrents over transmission-daemon"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "lazytorrent"
    test: |
      system "#{bin}/lazytorrent", "--version"
    dependencies:
      - name: transmission-cli
